<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2c5f2d">
  <meta name="description" content="民泊在庫管理アプリ — スマホで簡単在庫チェック">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>民泊在庫管理</title>
  <link rel="stylesheet" href="css/style.css?v=11">
</head>
<body>
  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>読み込み中…</p>
  </div>

  <!-- トースト通知 -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ログイン画面 -->
  <div id="login-screen" class="login-screen" style="display:none;">
    <div class="login-card">
      <div class="login-logo">🏠</div>
      <h1 class="login-title">民泊在庫管理</h1>
      <p class="login-desc">スマホで簡単に在庫チェック・補充記録</p>
      <div id="google-signin-btn" class="signin-btn-wrap"></div>
      <button id="manual-signin-btn" style="display:none;background:#4285f4;color:white;border:none;padding:14px 32px;font-size:16px;border-radius:8px;cursor:pointer;margin:12px 0;">Googleでログイン</button>
      <p id="login-error" style="display:none;color:#d32f2f;font-size:13px;margin:8px 0;"></p>
      <p class="login-note">管理者に登録済みのGoogleアカウントでログインしてください</p>
    </div>
  </div>

  <!-- アプリ画面 -->
  <div id="app-screen" class="app-screen" style="display:none;">
    <!-- ヘッダー -->
    <header class="app-header">
      <div class="header-top">
        <h1 class="app-title">🏠 在庫管理</h1>
        <div class="header-right">
          <span id="user-info"></span>
          <button id="btn-install" class="btn-icon" style="display:none;" title="アプリをインストール" aria-label="アプリをインストール">📲</button>
          <button id="btn-logout" class="btn-icon" title="ログアウト" aria-label="ログアウト">🚪</button>
        </div>
      </div>
      <div id="sync-status" class="sync-bar sync-saved">✅ 保存済み</div>
    </header>

    <!-- タブナビゲーション -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="stock">物件毎在庫</button>
      <button class="tab-btn" data-tab="overview">全体在庫一覧</button>
      <button class="tab-btn" data-tab="order">発注</button>
      <button class="tab-btn" data-tab="history">履歴</button>
      <button class="tab-btn" data-tab="settings" id="tab-settings" style="display:none;">設定</button>
    </nav>

    <!-- タブコンテンツ -->
    <main class="tab-main">
      <!-- 在庫タブ -->
      <section id="content-stock" class="tab-content active">
        <div class="stock-header">
          <select id="property-select" class="property-select" aria-label="物件を選択"></select>
        </div>
        <div id="category-filter" class="category-filter"></div>
        <div id="alert-summary" class="alert-summary"></div>
        <div id="stock-list" class="stock-list"></div>
      </section>

      <!-- 俯瞰タブ -->
      <section id="content-overview" class="tab-content">
        <div class="empty-msg">物件選択後に表示されます</div>
      </section>

      <!-- 発注タブ -->
      <section id="content-order" class="tab-content">
        <div class="empty-msg">読み込み中…</div>
      </section>

      <!-- 履歴タブ -->
      <section id="content-history" class="tab-content">
        <div class="empty-msg">読み込み中…</div>
      </section>

      <!-- 設定タブ -->
      <section id="content-settings" class="tab-content">
        <div class="empty-msg">読み込み中…</div>
      </section>
    </main>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- アプリケーション -->
  <script src="js/config.js?v=11"></script>
  <script src="js/auth.js?v=11"></script>
  <script src="js/store.js?v=11"></script>
  <script src="js/api.js?v=11"></script>
  <script src="js/ui.js?v=11"></script>
  <script src="js/app.js?v=11"></script>
</body>
</html>
